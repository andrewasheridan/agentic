# When a version-bump PR is squash-merged into main, create an annotated tag on
# the merge commit.
#
# RELEASE_TOKEN is passed to actions/checkout so that the push is attributed to
# the PAT rather than GITHUB_TOKEN, ensuring the push.tags event fires correctly.

name: Tag on merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag-merge-commit:
    name: Tag merge commit
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'chore/version-bump-')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}   # wire credential helper to PAT so tag push triggers downstream workflows

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#chore/version-bump-}"
          if [[ -z "$VERSION" ]]; then
            echo "Could not extract version from branch name: $BRANCH"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          git tag -a "v$VERSION" "${{ github.event.pull_request.merge_commit_sha }}" -m "Version $VERSION"
          git push origin "v$VERSION"
